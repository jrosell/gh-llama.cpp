name: Llama Inference

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'outputs/**'

permissions:
  contents: write

jobs:
  process-prompt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get Last Commit Message Elements
        id: commit_info
        run: |
          # 1. Capture ONLY the single-line commit subject title
          TITLE_RAW=$(git log -1 --pretty=%s)
          echo "title_msg=$TITLE_RAW" >> $GITHUB_OUTPUT

          # 2. Capture ONLY the body description paragraphs safely via an EOF multiline block
          echo "desc_msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%b >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Cache LLM Model
        id: cache-model
        uses: actions/cache@v5
        with:
          path: ./models
          key: gemma-2b-it-gguf-v3

      - name: Download Small Quantized Model (Gemma 2B)
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./models
          curl -L -o ./models/gemma-2-2b-it-Q4_K_M.gguf \
            https://huggingface.co/Bartowski/gemma-2-2b-it-GGUF/resolve/main/gemma-2-2b-it-Q4_K_M.gguf

      - name: Download and Install Pre-compiled llama.cpp
        run: |
          mkdir -p ./bin
          echo "Querying GitHub API for the latest llama.cpp release tag..."
          
          # Fetch the absolute newest tag dynamically (e.g., b9622)
          LATEST_TAG=$(curl -sL https://api.github.com/repos/ggml-org/llama.cpp/releases/latest | jq -r ".tag_name")
          echo "Targeting dynamic release asset: $LATEST_TAG"
          
          # Download and unpack the archive assets directly into our execution folder
          curl -L "https://github.com/ggml-org/llama.cpp/releases/download/${LATEST_TAG}/llama-${LATEST_TAG}-bin-ubuntu-x64.tar.gz" \
            | tar -xz -C ./bin --strip-components=1
          
          # Enforce execution rights on the exact target binary
          chmod +x ./bin/llama-completion

      - name: Generate AI Output via llama.cpp
        env:
          COMMIT_TITLE: ${{ steps.commit_info.outputs.title_msg }}
          COMMIT_DESC:  ${{ steps.commit_info.outputs.desc_msg }}
        run: |
          mkdir -p outputs

          if [ ! -f "./models/gemma-2-2b-it-Q4_K_M.gguf" ]; then
            echo "Error: Model file missing."
            exit 1
          fi

          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          FILE_PATH="outputs/response_${TIMESTAMP}.md"

          # Custom structured conversational scaffolding mapping your exact text phrasing layout
          FULL_PROMPT="<start_of_turn>user
          We received a commit with title \"$COMMIT_TITLE\". 
          In there they received the following prompt you must answer:

          $COMMIT_DESC
          <end_of_turn>
          <start_of_turn>model
          "

          echo "Running inference against prompt..."

          # Execution loop via standard working llama-completion configuration mapping
          ./bin/llama-completion \
            -m ./models/gemma-2-2b-it-Q4_K_M.gguf \
            --prompt "$FULL_PROMPT" \
            -t 4 \
            -n 256 \
            -no-cnv | tee "$FILE_PATH"

          echo ""
          echo "Generated file: $FILE_PATH"

      - name: Commit and Push Markdown File
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: add AI generated log from commit [skip ci]"
          file_pattern: 'outputs/*.md'
