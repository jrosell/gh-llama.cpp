- name: Download Small Quantized Model (Gemma 2B)
        if: steps.cache-model.outputs.cache-hit != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p ./models
          # Downloads the official file using your repository secret token
          curl -L -H "Authorization: Bearer $HF_TOKEN" -o ./models/2b_it_v2.gguf \
            https://huggingface.co/google/gemma-2-2b-it-GGUF/resolve/main/2b_it_v2.gguf

      - name: Install llama.cpp
        run: |
          NONINTERACTIVE=1 bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew install llama.cpp

      - name: Generate AI Output via llama.cpp
        env:
          COMMIT_PROMPT: ${{ steps.commit_info.outputs.msg }}
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          mkdir -p outputs

          if ! command -v llama-cli &> /dev/null; then
            echo "Error: llama-cli could not be found or initialized."
            exit 1
          fi

          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          FILE_PATH="outputs/response_${TIMESTAMP}.md"

          echo "Running inference against prompt..."

          # Changed -m model name here to point to your specific v2 file name
          llama-cli \
            -m ./models/2b_it_v2.gguf \
            -p "<start_of_turn>user\nTake this commit message and expand it into a detailed technical log or action list: $COMMIT_PROMPT\n<end_of_turn>\n<start_of_turn>model\n" \
            -t 4 \
            -n 256 \
            --verbosity -1 > "$FILE_PATH"

          echo "Generated file: $FILE_PATH"
