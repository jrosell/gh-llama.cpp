name: Llama Inference

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'outputs/**'

permissions:
  contents: write

jobs:
  process-prompt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get Last Commit Message
        id: commit_info
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Cache LLM Model
        id: cache-model
        uses: actions/cache@v5
        with:
          path: ./models
          key: gemma-2b-it-gguf-v3

      - name: Download Small Quantized Model (Gemma 2B)
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./models
          curl -L -o ./models/gemma-2-2b-it-Q4_K_M.gguf \
            https://huggingface.co/Bartowski/gemma-2-2b-it-GGUF/resolve/main/gemma-2-2b-it-Q4_K_M.gguf

      - name: Download and Install Pre-compiled llama.cpp
        run: |
          mkdir -p ./bin
          echo "Querying GitHub API for the latest llama.cpp release tag..."
          
          # Fetch the absolute newest tag dynamically (e.g., b9622)
          LATEST_TAG=$(curl -sL https://api.github.com/repos/ggml-org/llama.cpp/releases/latest | jq -r ".tag_name")
          echo "Targeting dynamic release asset: $LATEST_TAG"
          
          # Download and unpack the extracted files into the local bin directory
          curl -L "https://github.com/ggml-org/llama.cpp/releases/download/${LATEST_TAG}/llama-${LATEST_TAG}-bin-ubuntu-x64.tar.gz" \
            | tar -xz -C ./bin --strip-components=1
          
          # Enforce binary execution layout configurations
          chmod +x ./bin/llama-cli
          
          # Quick output audit check
          ./bin/llama-cli --version

      - name: Generate AI Output via llama.cpp
        env:
          COMMIT_PROMPT: ${{ steps.commit_info.outputs.msg }}
        run: |
          mkdir -p outputs

          if [ ! -f "./models/gemma-2-2b-it-Q4_K_M.gguf" ]; then
            echo "Error: Model file missing."
            exit 1
          fi

          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          FILE_PATH="outputs/response_${TIMESTAMP}.md"

          FULL_PROMPT="<start_of_turn>user
          Take this entire commit message (including its title and body description) and expand it into a detailed technical log or action list:

          $COMMIT_PROMPT
          <end_of_turn>
          <start_of_turn>model
          "

          echo "Running token generation processing loops..."

          # Running binary execution directly via raw inputs strings
          echo -e "$FULL_PROMPT" | ./bin/llama-cli \
            -m ./models/gemma-2-2b-it-Q4_K_M.gguf \
            -t 4 \
            -n 256 | tee "$FILE_PATH"

          echo ""
          echo "Generated file safely located at: $FILE_PATH"

      - name: Commit and Push Markdown File
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: add AI generated log from commit [skip ci]"
          file_pattern: 'outputs/*.md'
